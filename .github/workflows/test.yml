name: NodeBB Integration Tests


on:

  push:

    branches:
      - main


  pull_request:

    branches:
      - main



jobs:


  test:


    name:
      Node.js Test


    runs-on:
      ubuntu-latest



    strategy:

      matrix:

        node-version:
          - 18
          - 20
          - 22



    steps:



      -
        name:
          Checkout repository

        uses:
          actions/checkout@v4




      -
        name:
          Setup Node.js

        uses:
          actions/setup-node@v4

        with:

          node-version:
            ${{ matrix.node-version }}

          cache:
            npm





      -
        name:
          Install dependencies

        run:

          npm install





      -
        name:
          Check JavaScript syntax

        run:

          |
            node --check lib/routes.js
            node --check lib/mcp/server.js
            node --check lib/mcp/tools.js
            node --check lib/knowledge/indexer.js





      -
        name:
          Validate package

        run:

          npm test

        continue-on-error:
          true