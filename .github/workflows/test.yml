name: NodeBB Integration Tests


on:

  push:

    branches:
      - main

  pull_request:

    branches:
      - main




jobs:


  test:


    runs-on:
      ubuntu-latest



    strategy:


      matrix:


        node-version:

          - 20
          - 22





    steps:


      - name:
          Checkout

        uses:
          actions/checkout@v4




      - name:
          Setup Node

        uses:
          actions/setup-node@v4


        with:


          node-version:
            ${{ matrix.node-version }}



      - name:
          Install

        run:


          npm install





      - name:
          Syntax check

        run: |


          node --check library.js

          node --check lib/routes.js

          node --check lib/mcp/server.js

          node --check lib/mcp/tools.js