services:


  redis:


    image: redis:7-alpine


    container_name: nodebb-redis


    restart: unless-stopped


    command:

      - redis-server
      - --appendonly
      - yes
      - --requirepass
      - nodebb_redis_password



    volumes:


      - redis_data:/data



    networks:

      - nodebb-network






  nodebb:


    image: nodebb/docker:latest


    container_name: nodebb


    restart: unless-stopped



    depends_on:


      - redis



    ports:


      - "4567:4567"




    environment:


      NODEBB_URL:

        http://localhost:4567


      DATABASE:

        redis


      REDIS_HOST:

        redis


      REDIS_PORT:

        6379


      REDIS_PASSWORD:

        nodebb_redis_password



    volumes:


      - nodebb_data:/opt/nodebb



      - ./:/opt/nodebb/node_modules/nodebb-plugin-integration



    networks:


      - nodebb-network







  qdrant:


    image:

      qdrant/qdrant:latest



    container_name:

      nodebb-qdrant



    restart:

      unless-stopped



    ports:


      - "6333:6333"


      - "6334:6334"



    volumes:


      - qdrant_data:/qdrant/storage



    networks:


      - nodebb-network







  redis-commander:


    image:

      rediscommander/redis-commander:latest



    container_name:

      nodebb-redis-ui



    restart:

      unless-stopped



    depends_on:


      - redis



    ports:


      - "8081:8081"



    environment:


      REDIS_HOSTS:

        local:redis:6379:0:nodebb_redis_password



    networks:


      - nodebb-network






volumes:


  redis_data:


  nodebb_data:


  qdrant_data:





networks:


  nodebb-network:


    driver:

      bridge