services:


  mongodb:

    image: mongo:7

    container_name: nodebb-mongodb

    restart: unless-stopped


    environment:

      MONGO_INITDB_ROOT_USERNAME: nodebb

      MONGO_INITDB_ROOT_PASSWORD: nodebb_password


      MONGO_INITDB_DATABASE: nodebb


    volumes:

      - mongodb_data:/data/db


    networks:

      - nodebb-network





  nodebb:


    image: nodebb/docker:latest


    container_name: nodebb


    restart: unless-stopped



    depends_on:

      - mongodb



    ports:

      - "4567:4567"



    environment:


      NODEBB_URL:
        http://localhost:4567


      DATABASE:
        mongo


      MONGO_HOST:
        mongodb


      MONGO_PORT:
        27017


      MONGO_DATABASE:
        nodebb


      MONGO_USERNAME:
        nodebb


      MONGO_PASSWORD:
        nodebb_password



    volumes:


      - nodebb_data:/opt/nodebb



      # локальный плагин разработки

      - ./:/opt/nodebb/node_modules/nodebb-plugin-integration



    networks:

      - nodebb-network





  qdrant:


    image:
      qdrant/qdrant:latest


    container_name:
      nodebb-qdrant


    restart:
      unless-stopped



    ports:


      - "6333:6333"


      - "6334:6334"



    volumes:


      - qdrant_data:/qdrant/storage



    networks:


      - nodebb-network






  mongo-express:


    image:
      mongo-express:latest



    container_name:
      nodebb-mongo-express



    restart:
      unless-stopped



    depends_on:

      - mongodb



    ports:

      - "8081:8081"



    environment:


      ME_CONFIG_MONGODB_ADMINUSERNAME:

        nodebb



      ME_CONFIG_MONGODB_ADMINPASSWORD:

        nodebb_password



      ME_CONFIG_MONGODB_SERVER:

        mongodb



    networks:

      - nodebb-network






volumes:


  mongodb_data:


  nodebb_data:


  qdrant_data:





networks:


  nodebb-network:


    driver:
      bridge