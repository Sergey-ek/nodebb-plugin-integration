services:


  redis:


    image: redis:7-alpine


    container_name: nodebb-redis


    restart: unless-stopped


    command:

      - redis-server

      - --appendonly

      - "yes"

      - --requirepass

      - ${REDIS_PASSWORD}



    environment:

      REDIS_PASSWORD:

        ${REDIS_PASSWORD}



    volumes:

      - redis_data:/data



    networks:

      - nodebb-network



    healthcheck:

      test:

        [
          "CMD",
          "redis-cli",
          "-a",
          "${REDIS_PASSWORD}",
          "ping"
        ]

      interval: 10s

      timeout: 5s

      retries: 5







  nodebb:


    image: nodebb/docker:3.10


    container_name: nodebb


    restart: unless-stopped



    depends_on:


      redis:

        condition: service_healthy





    ports:


      - "4567:4567"





    environment:


      NODEBB_URL:

        http://localhost:4567



      DATABASE:

        redis



      REDIS_HOST:

        redis



      REDIS_PORT:

        6379



      REDIS_PASSWORD:

        ${REDIS_PASSWORD}





    volumes:


      - nodebb_data:/opt/nodebb



      # ňĺęóůčé ďđîĺęň ęŕę NodeBB plugin

      - ./:/opt/nodebb/node_modules/nodebb-plugin-integration





    networks:


      - nodebb-network







  qdrant:


    image: qdrant/qdrant:latest


    container_name: nodebb-qdrant


    restart: unless-stopped





    ports:


      - "6333:6333"


      - "6334:6334"





    volumes:


      - qdrant_data:/qdrant/storage





    networks:


      - nodebb-network







  redis-commander:


    image: rediscommander/redis-commander:latest


    container_name: nodebb-redis-ui


    restart: unless-stopped





    depends_on:


      redis:

        condition: service_healthy





    ports:


      - "8081:8081"





    environment:


      REDIS_HOSTS:

        local:redis:6379:0:${REDIS_PASSWORD}





    networks:


      - nodebb-network







volumes:


  redis_data:


  nodebb_data:


  qdrant_data:







networks:


  nodebb-network:


    driver:

      bridge